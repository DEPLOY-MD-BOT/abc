name: INFINITE-BOT-OXYGEN-V3

on:
  schedule:
    - cron: "*/45 * * * *" # GitHub Cron එක Backup එකක් ලෙස ක්‍රියා කරයි
  workflow_dispatch: # මැනුවල් ස්ටාර්ට් කිරීමට සහ ලූප් එක පවත්වා ගැනීමට
  push:
    branches: [ main ]

permissions:
  contents: write
  actions: write

jobs:
  ultra-engine:
    runs-on: ubuntu-latest
    # පැරණි workflow එකක් දුවනවා නම් එය වහාම නතර කර අලුත් එකට ඉඩ ලබා දේ
    concurrency:
      group: bot-loop
      cancel-in-progress: true

    steps:
      - name: 🚀 1. Ultra Fast Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: ⚡ 2. Vercel Pulse (Wake Up)
        run: |
          # Vercel App එක Sleep නොවී තබා ගැනීමට Ping එකක් යවයි
          # මෙතනට ඔබේ Vercel URL එක අනිවාර්යයෙන්ම දාන්න
          curl -Is https://abc-mu-ten.vercel.app/ | head -n 1
          echo "Vercel Pulse Sent Successfully!"

      - name: 🔥 3. Refresh System Files
        run: |
          mkdir -p internal
          # හැම වෙලාවකම අලුත් commit එකක් කිරීමට Random ID එකක් සාදයි
          echo "Last-Refresh: $(date)" > internal/status.txt
          echo "Salt: $((1 + $RANDOM % 10000))" >> internal/status.txt

      - name: 🛠️ 4. Push to Trigger Vercel Restart
        run: |
          git config --global user.name "bot-ultra-engine"
          git config --global user.email "engine@loop.com"
          git add internal/status.txt
          git commit -m "🚀 Vercel-Cycle: $(date +'%H:%M') [skip ci]" || exit 0
          git push

      - name: 🔄 5. Force Start Next Cycle (Anti-6-Hour)
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
        run: |
          echo "Triggering next 45-minute cycle immediately to prevent timeout..."
          # වත්මන් workflow එක නතර වීමට පෙර ඊළඟ එක trigger කරයි
          gh workflow run infinite_oxygen_loop.yml
          
      - name: ✅ 6. Final Sync
        run: |
          echo "Bot Status: ULTRA FAST & ONLINE"
          echo "Next cycle has been dispatched."
